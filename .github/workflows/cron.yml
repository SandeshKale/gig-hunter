name: Cron Jobs

on:
  schedule:
    - cron: '*/30 * * * *'
    - cron: '0 3 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    name: Scan Upwork
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger scan
        run: |
          RESPONSE=$(curl -s -w "\nHTTP:%{http_code}" \
            -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/scan" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q "HTTP:200" || exit 1

  followups:
    name: Follow-up Reminders
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger followups
        run: |
          RESPONSE=$(curl -s -w "\nHTTP:%{http_code}" \
            -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/followups" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q "HTTP:200" || exit 1
